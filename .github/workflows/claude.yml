name: Claude Code Action

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "mcp__github__pull_request_review_write,Glob,Grep,LS,Read,Bash(git diff:*),Bash(git log:*)"
          direct_prompt: |
            Review this pull request. Analyze the code changes for:
            - Bugs and correctness issues
            - Security vulnerabilities
            - REST convention violations (plural nouns, correct HTTP verbs, status codes 201/204/404/422, response envelope { data: T })
            - Missing error handling at system boundaries (user input, external APIs)

            After your analysis, submit a formal GitHub PR review using mcp__github__pull_request_review_write:
            - Use APPROVE if the code is acceptable (minor issues are ok)
            - Use REQUEST_CHANGES if there are critical bugs, security vulnerabilities, or major violations

            Include a concise summary of findings in the review body.
