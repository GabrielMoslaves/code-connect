name: Claude Code Action

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          direct_prompt: |
            Review this pull request for bugs, security issues, and code quality problems.
            Focus on: correctness, security vulnerabilities, missing error handling at system boundaries, and violations of REST conventions or the project's architecture.
            Post a concise summary of findings as a PR comment. If you find critical issues, make that clear.
