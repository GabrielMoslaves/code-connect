name: Claude Code Action

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Glob,Grep,LS,Read,Bash(git diff:*),Bash(git log:*),Bash(gh pr review:*)"
          direct_prompt: |
            Review this pull request. Analyze the code changes for:
            - Bugs and correctness issues
            - Security vulnerabilities
            - REST convention violations (plural nouns, correct HTTP verbs, status codes 201/204/404/422, response envelope { data: T })
            - Missing error handling at system boundaries (user input, external APIs)

            After your analysis, submit a formal GitHub PR review using the gh CLI:
            - If the code is acceptable (minor issues are ok): run Bash with: gh pr review ${{ github.event.pull_request.number }} --approve --body "YOUR SUMMARY"
            - If there are critical bugs or security issues: run Bash with: gh pr review ${{ github.event.pull_request.number }} --request-changes --body "YOUR SUMMARY"

            Do NOT post a regular comment. Only submit a formal review via gh pr review.
